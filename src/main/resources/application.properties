
# ==============================
# Application
# ==============================
spring.application.name=whylock
server.port=8085

# ==============================
# PostgreSQL
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/whylock}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ==============================
# Hibernate
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ==============================
# Redis
# ==============================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET:whylockSuperSecureJwtSecretKey2026VeryLongRandomString123456789}

# ==============================
# Groq AI
# ==============================
groq.api.key=${GROQ_API_KEY:}
whylock.groq.api-key=${GROQ_API_KEY:}
whylock.groq.model=llama-3.3-70b-versatile
whylock.groq.base-url=https://api.groq.com/openai/v1

# ==============================
# Resend (Email API)
# ==============================
resend.api.key=${RESEND_API_KEY:}
resend.from.email=onboarding@resend.dev

# ==============================
# Gmail SMTP
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==============================
# Logging
# ==============================
logging.level.org.springframework.boot.autoconfigure.mail=DEBUG
logging.level.org.springframework.mail=INFO
logging.level.com.whylock=DEBUG
logging.level.org.springframework.security=TRACE
